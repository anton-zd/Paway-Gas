<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paway Gas - Iniciar Sesión</title>
    <link rel="stylesheet" th:href="@{/style.css}">
    <link rel="stylesheet" th:href="@{/responsive.css}">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-header">
            <div class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-zap"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
            </div>
            <h1>Paway Gas</h1>
            <p>Huamanga — Ayacucho</p>
        </div>
        <div class="login-form-card">
            <h2>Iniciar sesión</h2>
            <p>Accede a tu cuenta para pedir gas o gestionar entregas</p>
            <div th:if="${param.error}" class="alert alert-danger" style="color: red; margin-bottom: 15px;">
                Usuario o contraseña inválidos.
            </div>
            <div th:if="${param.logout}" class="alert alert-success" style="color: green; margin-bottom: 15px;">
                Has cerrado sesión.
            </div>
            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label for="username">Correo</label>
                    <input type="text" id="username" name="username" required autofocus="autofocus">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn-login">Ingresar</button>
            </form>
            <div class="register-link">
                <p>¿No tienes cuenta? <a href="#">Regístrate</a></p>
            </div>
        </div>
    </div>
</body>
</html>
